name: Portfolio

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  docker-dev-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version Number
        id: versioning
        run: |
          DESCRIBE=$(git describe --tags --always --long)
          CLEAN=$(echo $DESCRIBE | sed -E 's/^v?([0-9.]+)-([0-9]+)-g[0-9a-f]+$/\1.\2/')
          echo "version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            vhernandorena/portfolio-dev:latest
            vhernandorena/portfolio-dev:${{ steps.versioning.outputs.version }}
