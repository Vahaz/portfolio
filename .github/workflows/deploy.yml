name: Portfolio

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  docker-dev-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version Number
        id: versioning
        run: |
          DESCRIBE=$(git describe --tags --always --long)
          echo "Full version: $DESCRIBE"

          CLEAN=$(echo $DESCRIBE | sed -E 's/^v?([0-9.]+)-([0-9]+)-g[0-9a-f]+$/\1.\2/')
          echo "version=$CLEAN" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            vhernandorena/portfolio-dev:latest
            vhernandorena/portfolio-dev:${{ steps.versioning.outputs.version }}

  github-pages-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: prod
